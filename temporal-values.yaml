web:
  enabled: true
  replicaCount: 1
  image:
    repository: temporalio/ui
    tag: 2.49.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    appProtocol: http
    annotations: {}
  readinessProbe:
    initialDelaySeconds: 10
    httpGet:
      path: /healthz
      port: http
  ingress:
    enabled: false
    annotations: {}
    hosts:
      - "/"
    tls: []
  deploymentLabels: {}
  deploymentAnnotations: {}
  deploymentStrategy: {}
  podAnnotations: {}
  podLabels: {}
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  nodeSelector: {}
  tolerations:
    - key: node.kubernetes.io/not-ready
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 10
    - key: node.kubernetes.io/unreachable
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 10
  affinity: {}
  additionalVolumes: []
  additionalVolumeMounts: []
  additionalEnv: []
  additionalEnvSecretName: ""
  additionalEnvConfigMapName: ""
  containerSecurityContext: {}
  securityContext: {}
  topologySpreadConstraints: []
