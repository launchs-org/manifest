apiVersion: apps/v1
kind: Deployment
metadata:
  name: launchs-org-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: launchs-org-controller
  template:
    metadata:
      labels:
        app: launchs-org-controller
    spec:
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 10
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: launchs-org-controller
      serviceAccountName: launchs-org-controller
      containers:
        - name: launchs-org-controller
          image: ghcr.io/launchs-org/controller:0.1.3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: DATABASE_TYPE
              value: "postgres"
            - name: K8S_NAMESPACE
              value: "default"
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: launchs-org-secret
                  key: DATABASE_DSN
            - name: TASK_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: launchs-org-secret
                  key: TASK_DATABASE_DSN
            - name: HARBOR_URL
              valueFrom:
                secretKeyRef:
                  name: launchs-org-secret
                  key: HARBOR_URL
            - name: HARBOR_PROJECT
              value: "buildkit"
            - name: REDIS_ADDR
              value: "launchs-org-dragonfly.launchs-org:6379"